<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>护照信息识别工具</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>📖 护照信息识别工具</h1>
        <p>上传多张护照图片，AI 批量识别并导出 Excel</p>
      </header>

      <main>
        <!-- 配置区域 -->
        <section id="config-section" class="card">
          <h2>⚙️ API 配置</h2>
          <div class="form-row">
            <label for="api-key">API Key</label>
            <input type="password" id="api-key" placeholder="sk-..." />
          </div>
          <div class="form-row">
            <label for="api-url">API 地址</label>
            <input type="text" id="api-url" value="https://token.sensenova.cn/v1" placeholder="https://api.openai.com/v1" />
          </div>
          <div class="form-row">
            <label for="model-name">模型名称</label>
            <input type="text" id="model-name" value="sensenova-6.7-flash-lite" placeholder="gpt-4o" />
          </div>
        </section>

        <!-- 上传区域 -->
        <section id="upload-section" class="card">
          <h2>📷 上传护照图片</h2>
          <div class="upload-area" id="upload-area">
            <p>点击选择多张护照图片</p>
            <p class="hint">支持 JPG / PNG 格式，可一次选择多张</p>
            <input type="file" id="file-input" accept="image/png,image/jpeg" multiple hidden />
            <button id="select-btn" class="btn-primary">选择图片</button>
          </div>
          <div id="preview-gallery" class="hidden">
            <div id="thumbnails"></div>
            <div class="action-bar" style="margin-top:12px">
              <button id="add-more-btn" class="btn-secondary">➕ 继续添加</button>
              <button id="start-all-btn" class="btn-primary">🚀 开始识别全部</button>
            </div>
          </div>
        </section>

        <!-- 识别进度 -->
        <section id="progress-section" class="card hidden">
          <h2>⏳ 识别进度</h2>
          <div id="progress-bar-container">
            <div id="progress-bar"></div>
          </div>
          <p id="progress-text">0 / 0</p>
        </section>

        <!-- 结果表格 -->
        <section id="result-section" class="card hidden">
          <h2>📋 识别结果</h2>
          <div id="table-wrapper">
            <table id="result-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>中文姓名</th>
                  <th>性别</th>
                  <th>英文姓</th>
                  <th>英文名</th>
                  <th>证件号</th>
                  <th>出生日期</th>
                  <th>出生地</th>
                  <th>签发地</th>
                  <th>签发日期</th>
                  <th>有效期</th>
                  <th>国家码</th>
                  <th>联系电话</th>
                </tr>
              </thead>
              <tbody id="result-body"></tbody>
            </table>
          </div>
          <div class="action-bar" style="margin-top:16px">
            <button id="export-btn" class="btn-success">📥 导出全部到 Excel</button>
          </div>
          <div id="loading" class="hidden">
            <div class="spinner"></div>
            <span>正在识别中，请稍候...</span>
          </div>
        </section>

        <!-- 已导出记录列表 -->
        <section id="history-section" class="card hidden">
          <h2>📂 导出记录</h2>
          <div id="export-history"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
